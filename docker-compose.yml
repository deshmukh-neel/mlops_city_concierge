services:
  db:
    image: pgvector/pgvector:pg16
    container_name: city_concierge_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-city_concierge}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-city_concierge}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: city_concierge_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://35.223.147.177:5000}
      MLFLOW_MODEL_NAME: ${MLFLOW_MODEL_NAME:-city-concierge-rag}
    ports:
      - "${APP_PORT:-8000}:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    container_name: city_concierge_frontend
    restart: unless-stopped
    working_dir: /app
    environment:
      VITE_PROXY_TARGET: http://app:8000
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0"
    depends_on:
      - app

volumes:
  pgdata:
  frontend_node_modules:
