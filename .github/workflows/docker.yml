name: Docker build, scan & deploy

# Builds the FastAPI container, scans it with Trivy, pushes to Google
# Artifact Registry, and (optionally) deploys to Cloud Run.
#
# Triggers:
#   - push to main          -> tag image as `latest` and commit SHA
#   - push of a git tag v*  -> tag image with the semver tag
#   - manual (workflow_dispatch) for ad-hoc runs
#
# Required repo-level configuration (Settings -> Secrets and variables -> Actions):
#   Variables (not secrets — no credentials, safe to store as vars):
#     GCP_PROJECT_ID                  = mlops-491820
#     GCP_WORKLOAD_IDENTITY_PROVIDER  = projects/<PROJECT_NUMBER>/locations/global/workloadIdentityPools/github-pool/providers/github-provider
#     GCP_SERVICE_ACCOUNT             = github-actions-deployer@mlops-491820.iam.gserviceaccount.com
#
# The Cloud Run deploy step is commented out. Uncomment it after you have
# created the Cloud Run service manually once with the env vars / secrets
# your app needs. See docs/DEPLOY.md (or the project README) for the
# initial `gcloud run deploy` command.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GAR_REGION: us-central1
  GAR_REPO: ml-repo
  IMAGE_NAME: city-concierge
  CLOUD_RUN_SERVICE: city-concierge-api
  CLOUD_RUN_REGION: us-central1
  CLOUD_SQL_INSTANCE: mlops-491820:us-central1:mlops--city-concierge
  POSTGRES_DB: mlops-city-concierge

jobs:
  build-scan-push:
    name: Build, scan, push to Artifact Registry
    runs-on: ubuntu-latest

    # Required for Workload Identity Federation (GitHub OIDC -> GCP)
    permissions:
      contents: read
      id-token: write

    outputs:
      image_uri: ${{ steps.image.outputs.uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_REGION }}-docker.pkg.dev --quiet

      - name: Compute image tags
        id: image
        run: |
          REGISTRY="${GAR_REGION}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${GAR_REPO}/${IMAGE_NAME}"
          SHA_TAG="${REGISTRY}:${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            SEMVER="${GITHUB_REF#refs/tags/}"
            PRIMARY="${REGISTRY}:${SEMVER}"
          else
            PRIMARY="${REGISTRY}:latest"
          fi
          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "primary=${PRIMARY}"   >> "$GITHUB_OUTPUT"
          echo "sha=${SHA_TAG}"       >> "$GITHUB_OUTPUT"
          # Used downstream for Cloud Run deploys — the primary tag
          echo "uri=${PRIMARY}"       >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load locally for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: |
            ${{ steps.image.outputs.primary }}
            ${{ steps.image.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.primary }}
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          vuln-type: os,library
          trivyignores: .trivyignore

      - name: Push image to Artifact Registry
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.primary }}
            ${{ steps.image.outputs.sha }}
          cache-from: type=gha

  # ---------------------------------------------------------------------------
  # Migrate prod database
  #
  # Runs in parallel with build-scan-push; both gate `deploy`. If migrate
  # fails, the new image still gets pushed to Artifact Registry (harmless)
  # but Cloud Run is not rolled forward. alembic upgrade head is idempotent —
  # safe to run on every push to main, even when no migrations changed.
  # ---------------------------------------------------------------------------
  migrate:
    name: Migrate prod database
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        run: pipx install "poetry==1.8.3"

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-py3.10-${{ hashFiles('poetry.lock') }}

      - name: Install dev dependencies
        run: poetry install --with dev --no-interaction --no-root

      - name: Start Cloud SQL Auth Proxy
        # nohup + disown so the proxy survives this step's shell. Logs go to
        # cloud-sql-proxy.log so a later step (or post-failure inspection) can
        # tail it. We poll for the listener instead of `sleep N` because the
        # proxy can take 1–10s depending on network/DNS.
        run: |
          curl -sS -L \
            -o cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.13.0/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          nohup ./cloud-sql-proxy --port 5432 "${{ env.CLOUD_SQL_INSTANCE }}" \
            > cloud-sql-proxy.log 2>&1 &
          disown
          for i in {1..30}; do
            if nc -z 127.0.0.1 5432; then
              echo "proxy listening on 5432"
              exit 0
            fi
            sleep 1
          done
          echo "proxy failed to start; log:" >&2
          cat cloud-sql-proxy.log >&2 || true
          exit 1

      - name: Read POSTGRES_PASSWORD from Secret Manager
        id: pg
        run: |
          pw=$(gcloud secrets versions access latest \
            --secret=POSTGRES_PASSWORD \
            --project=${{ vars.GCP_PROJECT_ID }})
          echo "::add-mask::$pw"
          echo "password=$pw" >> "$GITHUB_OUTPUT"

      - name: Show alembic current (before)
        env:
          DATABASE_URL: postgresql://postgres:${{ steps.pg.outputs.password }}@127.0.0.1:5432/${{ env.POSTGRES_DB }}
        run: poetry run alembic current

      - name: Run alembic upgrade head
        env:
          DATABASE_URL: postgresql://postgres:${{ steps.pg.outputs.password }}@127.0.0.1:5432/${{ env.POSTGRES_DB }}
        run: poetry run alembic upgrade head

      - name: Show alembic current (after)
        env:
          DATABASE_URL: postgresql://postgres:${{ steps.pg.outputs.password }}@127.0.0.1:5432/${{ env.POSTGRES_DB }}
        run: poetry run alembic current

  # ---------------------------------------------------------------------------
  # Cloud Run auto-deploy
  #
  # Only runs on push to main (not on tags or manual dispatch). Swaps in the
  # new image on the existing service; existing env vars, secret mounts, and
  # Cloud SQL attachments are preserved by deploy-cloudrun@v2 when only
  # `image` is specified. The service itself must already exist (created
  # manually once via `gcloud run deploy ...`).
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Cloud Run
    needs: [build-scan-push, migrate]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      # ----- Cloud Run config (W0 — agent product) -----
      # Sizing/concurrency flags (replace just the named fields):
      #   min-instances=1   keep one warm; ~$15/mo to avoid 3–8s cold starts on demo.
      #   max-instances=10  headroom for class-project demo, capped to bound cost.
      #   concurrency=15    agent requests do 5+ blocking LLM calls; default 80 stacks
      #                     too many in-flight astream_events per instance.
      #   timeout=120       agent self-correction can take 30–60s.
      #   cpu=2 / memory=2Gi  LangGraph + tool calls + embedding client are heavier
      #                       than the legacy chain.
      #
      # env_vars / secrets default to MERGE — they only add/update the listed keys
      # and leave existing values (OPENAI_API_KEY, GEMINI_API_KEY, POSTGRES_PASSWORD,
      # MLFLOW_TRACKING_URI, CLOUD_SQL_INSTANCE_CONNECTION_NAME, …) untouched.
      #
      # PREREQUISITE: the 4 new secrets below must exist in Secret Manager before
      # this job runs, or the deploy step fails. Resource names are UPPERCASE to
      # match the existing OPENAI_API_KEY / GEMINI_API_KEY / POSTGRES_PASSWORD
      # secrets and the env-var names in .env / .env.example. One-time setup:
      #   for s in ANTHROPIC_API_KEY LANGFUSE_SECRET_KEY LANGFUSE_PUBLIC_KEY \
      #            MLFLOW_TRACKING_TOKEN; do
      #     gcloud secrets create "$s" --replication-policy=automatic
      #     printf '%s' "<value>" | gcloud secrets versions add "$s" --data-file=-
      #     gcloud secrets add-iam-policy-binding "$s" \
      #       --member=serviceAccount:739618408593-compute@developer.gserviceaccount.com \
      #       --role=roles/secretmanager.secretAccessor
      #   done
      - name: Deploy new image to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          region: ${{ env.CLOUD_RUN_REGION }}
          image: ${{ needs.build-scan-push.outputs.image_uri }}
          flags: >-
            --min-instances=1
            --max-instances=10
            --concurrency=15
            --cpu=2
            --memory=2Gi
            --timeout=120
          env_vars: |
            AGENT_MAX_STEPS=8
            LANGFUSE_HOST=https://cloud.langfuse.com
            EMBEDDING_TABLE=place_embeddings
          secrets: |
            ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest
            LANGFUSE_SECRET_KEY=LANGFUSE_SECRET_KEY:latest
            LANGFUSE_PUBLIC_KEY=LANGFUSE_PUBLIC_KEY:latest
            MLFLOW_TRACKING_TOKEN=MLFLOW_TRACKING_TOKEN:latest
