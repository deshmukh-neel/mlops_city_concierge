name: CI

on:
  push:
    branches: [main]      # post-merge validation
  pull_request:
    branches: [main]      # PR-time validation (opened + synchronize)

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  POETRY_VERSION: "1.8.3"
  PYTHON_VERSION: "3.10"

jobs:
  lint:
    name: Lint & format (ruff, includes bandit/S rules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pipx install "poetry==${{ env.POETRY_VERSION }}"

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}

      - name: Install dev dependencies
        run: poetry install --with dev --no-interaction --no-root

      - name: Ruff lint (includes S / flake8-bandit security rules)
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pipx install "poetry==${{ env.POETRY_VERSION }}"

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}

      - name: Install dev dependencies
        run: poetry install --with dev --no-interaction --no-root

      - name: mypy
        run: poetry run mypy app/

  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pipx install "poetry==${{ env.POETRY_VERSION }}"

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}

      - name: Install dev dependencies
        run: poetry install --with dev --no-interaction --no-root

      - name: Run unit tests with coverage
        run: poetry run pytest tests/unit/ -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore

  lint-baselines:
    name: Stale-baseline lint (hard gate — Plan 03-07 / EVAL-07 / P9)
    # HARD gate: every PR that touches app/agent/ must also refresh
    # configs/eval_baselines/*.json, or the latest commit message must
    # carry the explicit [skip-baseline] bypass token. The lint logic
    # lives in scripts/check_baselines_fresh.py (stdlib-only, see Plan
    # 03-07 Task 1) so the dependency surface here is zero — `poetry
    # install` is only needed because the canonical CI invocation runs
    # via `poetry run python` for consistency with the other jobs.
    #
    # No `continue-on-error: true`: unlike plan 03-06's eval-matrix job
    # (soft-gated until baselines exist), this gate is hard from day one.
    # Phase 4-6 PRs CANNOT ship app/agent/ changes without baseline refresh.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # REQUIRED for git diff against the PR's merge base. The default
          # shallow clone only includes the PR head and would crash the
          # `git diff BASE_SHA...HEAD` invocation inside the lint script.
          fetch-depth: 0
          # REQUIRED for the [skip-baseline] bypass to work. The default
          # checkout ref on pull_request is refs/pull/{n}/merge — a synthetic
          # merge commit whose auto-generated message ("Merge X into Y")
          # never contains the bypass token. check_baselines_fresh reads
          # HEAD's commit message via `git log -1 --format=%B`, so without
          # this override the developer's bypass commit is HEAD~1 and the
          # gate cannot be bypassed.
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pipx install "poetry==${{ env.POETRY_VERSION }}"

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}

      - name: Install dev dependencies
        run: poetry install --with dev --no-interaction --no-root

      - name: Check baselines fresh vs PR base
        # The script exits 1 with an actionable error when app/agent/ is
        # touched but no configs/eval_baselines/*.json was updated, unless
        # the latest commit message contains [skip-baseline]. It exits 2 on
        # infrastructure failure (missing git binary, empty BASE_SHA, git
        # rc != 0) per Plan 03-10 / WR-02.
        # IN-01 mitigation: BASE_SHA threaded via env block, not run-string interpolation.
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: poetry run python scripts/check_baselines_fresh.py "$BASE_SHA"

  eval-matrix:
    name: Eval matrix (scripted mode — no real APIs)
    # Runs scripts/eval_matrix.py in scripted mode (EVAL-09 / P4): no LLM
    # API keys, no network calls, just the deterministic ScriptedChatModel
    # fan-out. Independent of test/lint/typecheck/migrations — parallel-safe.
    # The runtime gate in scripts/eval_matrix.py is intentionally bypassed
    # via --llm-provider-override scripted (threaded through LLM_OVERRIDE
    # in the Makefile target), so CI never accidentally runs real-provider
    # matrices even when API key env vars are configured at the runner level.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pipx install "poetry==${{ env.POETRY_VERSION }}"

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}

      - name: Install dev dependencies
        # `app` is a poetry-editable-installed package (pyproject.toml:
        # `packages = [{ include = "app" }]`). The eval-matrix scripts
        # `from app... import` at module top level, so `--no-root` would
        # leave them with `ModuleNotFoundError: No module named 'app'`.
        # Other jobs (unit/mypy/lint) avoid this by going through pytest
        # auto-discovery / mypy direct-source scanning, so they tolerate
        # `--no-root`. See project_app_editable_install memory.
        # Docker deploy MUST keep `--no-root` for the README.md packaging
        # reason — see project_docker_no_root_packaging — but that's
        # Dockerfile, not ci.yml.
        run: poetry install --with dev --no-interaction

      - name: Run eval matrix (scripted, RUNS=1)
        # Phase 3 soft-gate: the matrix runner exits non-zero when scripted
        # cells fail scorer thresholds (expected — the ScriptedChatModel
        # fallback path doesn't commit stops). Plan 03-07 commits the
        # baselines that flip this to a hard gate; until then we let the
        # job stay green so PR merge isn't blocked. The summary.json
        # artifact below preserves the matrix output for PR review.
        continue-on-error: true
        run: make eval-matrix LLM_OVERRIDE=scripted RUNS=1

      - name: Run eval matrix — refinement scenarios structural check (no subprocess)
        # Phase 6 plan 06-07 / N-4 + NEW HIGH-A: HARD gate (no
        # continue-on-error). Invokes the structural-check Makefile target
        # which validates the refinement matrix end-to-end WITHOUT calling
        # subprocess.run — sidesteps the SCRIPTED_SCENARIOS-empty problem
        # at app/llm_factory.py:170. Catches silent-fail modes REF-04
        # wants caught: matrix YAML doesn't load, env override propagation
        # breaks, scorer registration drifts, shared helper breaks.
        # Empirical regression on absolute scorer floors is enforced by
        # the blocking human checkpoint in plan 06-07 Task 3.
        run: make eval-matrix-refinement-structural-check

      - name: Check gates against committed baselines (D-11-15)
        # D-11-15 / BASE-03: reads configs/eval_baselines/*.json; no live keys needed.
        # Hard gate: a committed regression below a hard gate fails CI.
        # Uses check_eval_gates.py --baselines-mode (input-source swap; _check_gate unchanged).
        # Advisory entries (WR-05) print ADVISORY/WARN lines but never block CI.
        # This job installs with poetry install --with dev --no-interaction (no --no-root)
        # per project_ci_no_root_eval_matrix: check_eval_gates.py imports app transitively.
        run: make eval-gates-check-baselines

      - name: Run reasoning conformance tests (required — D-11-19)
        # D-11-19: promoted from quarantined to required CI (D-08-14 resolution).
        # Mock-driven (no live keys needed); fixtures SKIP gracefully when absent (D-10-12).
        # reasoning_conformance marker covers _prune_for_llm / adapter round-trip tests.
        run: make test-reasoning-conformance

      - name: Upload eval matrix report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-matrix-report
          path: eval_reports/**/*.json
          if-no-files-found: ignore

  migrations:
    name: Alembic migrations apply cleanly
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: city_concierge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d city_concierge"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/city_concierge
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pipx install "poetry==${{ env.POETRY_VERSION }}"

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}

      - name: Install dev dependencies
        run: poetry install --with dev --no-interaction --no-root

      - name: Apply baseline schema (init.sql)
        run: psql "$DATABASE_URL" -f scripts/db/init.sql

      - name: Upgrade to head
        run: poetry run alembic upgrade head

      - name: Round-trip — downgrade to base then upgrade
        run: |
          poetry run alembic downgrade base
          poetry run alembic upgrade head

  integration-cloud:
    name: Integration tests (Cloud SQL via proxy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for Workload Identity Federation
    env:
      CLOUD_SQL_INSTANCE: mlops-491820:us-central1:mlops--city-concierge
      CLOUD_SQL_DB: mlops-city-concierge
      CLOUD_SQL_PORT: "5432"
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pipx install "poetry==${{ env.POETRY_VERSION }}"

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}

      - name: Install dev dependencies
        run: poetry install --with dev --no-interaction --no-root

      - name: Start Cloud SQL Auth Proxy
        # nohup + disown so the proxy survives this step's shell. Logs go to
        # cloud-sql-proxy.log so a later step can tail it on failure. We poll
        # for the listener instead of `sleep N` because the proxy can take
        # 1-10s depending on network/DNS.
        run: |
          curl -sS -L \
            -o cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.13.0/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          nohup ./cloud-sql-proxy --port "${CLOUD_SQL_PORT}" "${CLOUD_SQL_INSTANCE}" \
            > cloud-sql-proxy.log 2>&1 &
          disown
          for i in {1..30}; do
            if nc -z 127.0.0.1 "${CLOUD_SQL_PORT}"; then
              echo "proxy listening on ${CLOUD_SQL_PORT}"
              exit 0
            fi
            sleep 1
          done
          echo "proxy failed to start; log:" >&2
          cat cloud-sql-proxy.log >&2 || true
          exit 1

      - name: Run integration tests
        env:
          APP_ENV: integration
          # The booking integration test exercises the real semantic_search
          # path, which calls OpenAI for embeddings. Without a real key the
          # conftest setdefault stub leaks through and the test 401s. Other
          # integration tests don't touch OpenAI; this is just for booking.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        # The CI service account is provisioned as a CLOUD_IAM_SERVICE_ACCOUNT
        # DB user named with the .gserviceaccount.com suffix dropped. We
        # URL-encode the @ in the user, and the IAM token is the password.
        run: |
          SA_USER="${{ vars.GCP_SERVICE_ACCOUNT }}"
          DB_USER="${SA_USER%.gserviceaccount.com}"
          ENCODED_USER=$(printf '%s' "$DB_USER" | sed 's/@/%40/g')
          TOKEN=$(gcloud sql generate-login-token)
          export DATABASE_URL="postgresql://${ENCODED_USER}:${TOKEN}@127.0.0.1:${CLOUD_SQL_PORT}/${CLOUD_SQL_DB}"
          poetry run pytest tests/integration/ -v

      - name: Proxy logs on failure
        if: failure()
        run: cat cloud-sql-proxy.log || true
