name: CI

on:
  push:
    branches: [main]      # post-merge validation
  pull_request:
    branches: [main]      # PR-time validation (opened + synchronize)

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  POETRY_VERSION: "1.8.3"
  PYTHON_VERSION: "3.10"

jobs:
  lint:
    name: Lint & format (ruff, includes bandit/S rules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pipx install "poetry==${{ env.POETRY_VERSION }}"

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}

      - name: Install dev dependencies
        run: poetry install --with dev --no-interaction --no-root

      - name: Ruff lint (includes S / flake8-bandit security rules)
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pipx install "poetry==${{ env.POETRY_VERSION }}"

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}

      - name: Install dev dependencies
        run: poetry install --with dev --no-interaction --no-root

      - name: mypy
        run: poetry run mypy app/

  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pipx install "poetry==${{ env.POETRY_VERSION }}"

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}

      - name: Install dev dependencies
        run: poetry install --with dev --no-interaction --no-root

      - name: Run unit tests with coverage
        run: poetry run pytest tests/unit/ -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore

  migrations:
    name: Alembic migrations apply cleanly
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: city_concierge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d city_concierge"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/city_concierge
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pipx install "poetry==${{ env.POETRY_VERSION }}"

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}

      - name: Install dev dependencies
        run: poetry install --with dev --no-interaction --no-root

      - name: Apply baseline schema (init.sql)
        run: psql "$DATABASE_URL" -f scripts/db/init.sql

      - name: Upgrade to head
        run: poetry run alembic upgrade head

      - name: Round-trip — downgrade to base then upgrade
        run: |
          poetry run alembic downgrade base
          poetry run alembic upgrade head

  integration-cloud:
    name: Integration tests (Cloud SQL via proxy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for Workload Identity Federation
    env:
      CLOUD_SQL_INSTANCE: mlops-491820:us-central1:mlops--city-concierge
      CLOUD_SQL_DB: mlops-city-concierge
      CLOUD_SQL_PORT: "5432"
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pipx install "poetry==${{ env.POETRY_VERSION }}"

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}

      - name: Install dev dependencies
        run: poetry install --with dev --no-interaction --no-root

      - name: Start Cloud SQL Auth Proxy
        # nohup + disown so the proxy survives this step's shell. Logs go to
        # cloud-sql-proxy.log so a later step can tail it on failure. We poll
        # for the listener instead of `sleep N` because the proxy can take
        # 1-10s depending on network/DNS.
        run: |
          curl -sS -L \
            -o cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.13.0/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          nohup ./cloud-sql-proxy --port "${CLOUD_SQL_PORT}" "${CLOUD_SQL_INSTANCE}" \
            > cloud-sql-proxy.log 2>&1 &
          disown
          for i in {1..30}; do
            if nc -z 127.0.0.1 "${CLOUD_SQL_PORT}"; then
              echo "proxy listening on ${CLOUD_SQL_PORT}"
              exit 0
            fi
            sleep 1
          done
          echo "proxy failed to start; log:" >&2
          cat cloud-sql-proxy.log >&2 || true
          exit 1

      - name: Apply migrations + run integration tests
        env:
          APP_ENV: integration
          # The booking integration test exercises the real semantic_search
          # path, which calls OpenAI for embeddings. Without a real key the
          # conftest setdefault stub leaks through and the test 401s. Other
          # integration tests don't touch OpenAI; this is just for booking.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        # The CI service account is provisioned as a CLOUD_IAM_SERVICE_ACCOUNT
        # DB user named with the .gserviceaccount.com suffix dropped. We
        # URL-encode the @ in the user, and the IAM token is the password.
        # We run `alembic upgrade head` against Cloud SQL before the suite so
        # integration tests see the current schema on every PR — gating
        # schema regressions on the same job that depends on the schema.
        run: |
          SA_USER="${{ vars.GCP_SERVICE_ACCOUNT }}"
          DB_USER="${SA_USER%.gserviceaccount.com}"
          ENCODED_USER=$(printf '%s' "$DB_USER" | sed 's/@/%40/g')
          TOKEN=$(gcloud sql generate-login-token)
          export DATABASE_URL="postgresql://${ENCODED_USER}:${TOKEN}@127.0.0.1:${CLOUD_SQL_PORT}/${CLOUD_SQL_DB}"
          poetry run alembic upgrade head
          poetry run pytest tests/integration/ -v

      - name: Proxy logs on failure
        if: failure()
        run: cat cloud-sql-proxy.log || true
