# Cross-provider eval matrix config (Plan 03-05 / EVAL-05 / D-06)
#
# Anchored providers for v2.0 Phases 3-6 (D-06):
#   - openai/gpt-4o-mini (decisive tool-caller; project memory:
#     convergence_premise_inverted shows it converges 1/6 vs DeepSeek 4/6,
#     so it surfaces the regression class plan 03-07 baselines target)
#   - deepseek/deepseek-chat (different model family; P7 mitigation
#     against single-model overfit; reasoning disabled per llm_factory.py)
#
# Gemini and Kimi are EXCLUDED for v2.0 — project memory flags both as
# unstable (thought-signatures / reasoning_content round-trip). Re-add per-
# provider when the underlying issues are mitigated.
#
# Default baseline scenarios (D-07 / plan 03-05 task 2; updated by Phase 6):
#   - omakase_mission_open_ended    (category_compliance baseline)
#   - late_night_closure_cascade    (multi-turn closure-aware swap)
#
# Phase 6 plan 06-07 / D-06-09: the multi-turn refinement scenario was
# moved to a sibling matrix file (configs/eval_matrix_refinement.yaml)
# so this default matrix runs first-turn cells with the flag OFF and
# preserves REF-04 (omakase first-turn no-regression).

entries:
  - provider: openai
    model: gpt-4o-mini
  - provider: deepseek
    model: deepseek-chat
  # Phase 11 / D-11-12 / BASE-02: cross-model entries (flag-OFF — no env override)
  # Wave-1 deferral: baseline cells not yet written (Wave-2 live regen pending).
  # Gemini is intentionally EXCLUDED from this matrix per D-11-12 / PROV-04
  # experimental standing — gemini coverage lives only in eval_matrix_refinement.yaml.
  - provider: openai
    model: gpt-5-mini
  - provider: anthropic
    model: claude-sonnet-4-6
  - provider: deepseek
    model: deepseek-reasoner

scenarios:
  - omakase_mission_open_ended
  # D-11-13: late_night_closure_cascade removed from default scenarios (D-10-09 quarantine).
  # Still runnable: make eval-matrix SCENARIOS=late_night_closure_cascade
  # Cost rationale: 5 providers × 5 runs of a baseline-ineligible scenario is pure burn.
  # D-10-09/10 standing: baseline_eligible: false is set in eval_queries.yaml;
  # the baseline JSON is annotated with _observations (D-10-10) but NOT regenerated
  # and NOT deleted.
