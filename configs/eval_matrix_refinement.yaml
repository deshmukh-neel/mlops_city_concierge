# Phase 6 refinement-only matrix (D-06-09 / D-06-10 / plan 06-07).
#
# Runs the refinement_cheaper scenario against BOTH provider entries
# under REFINEMENT_STRUCTURED_PLAN_ENABLED=true. The merge gate is
# strict 1.0 on openai/gpt-4o-mini only (D-06-09). DeepSeek is
# logged-but-not-gated per D-04-11 / D-06-09 — its cell still RUNS so
# its scores are captured in the baseline JSON, but no gate-on-failure
# is enforced.
#
# Per-cell env override (Phase 6 / plan 06-06 / D-06-10):
#   - REFINEMENT_STRUCTURED_PLAN_ENABLED=true gates the structured-plan
#     HumanMessage injection in both /chat and the eval prod branch.
#   - Values MUST be YAML strings ("true" in quotes) — `MatrixEntry.env`
#     validator rejects non-string scalars (PATTERNS.md § 9).

entries:
  - provider: openai
    model: gpt-4o-mini
    env:
      REFINEMENT_STRUCTURED_PLAN_ENABLED: "true"
  - provider: deepseek
    model: deepseek-chat
    env:
      REFINEMENT_STRUCTURED_PLAN_ENABLED: "true"
  # Phase 7 / D-07-08: gpt-5-mini added as logged-not-gated entry.
  # Runs the refinement_cheaper cell so PROMPT-05 (gpt-5-mini median > 0
  # across 5 runs at temp=1.0) can be measured, but the merge gate stays
  # at openai/gpt-4o-mini only — Makefile + scripts/check_baselines_fresh.py
  # are unchanged. Reasoning stays ENABLED (D-07-09): disabling it would
  # neutralize the falsifier signal that PROMPT-05 was designed to surface.
  - provider: openai
    model: gpt-5-mini
    env:
      REFINEMENT_STRUCTURED_PLAN_ENABLED: "true"

scenarios:
  - refinement_cheaper
